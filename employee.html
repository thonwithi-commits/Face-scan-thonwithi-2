<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Thonwithi - พอร์ทัลพนักงาน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --bg-main: #0a0a0a;
      --card-bg: #ffffff;
      --accent: #3e2723;
      --accent-gold: #c6a664;
      --text-dark: #1a1a1a;
      --text-muted: #757575;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --shadow: 0 15px 35px rgba(0,0,0,0.1);
    }

    body { 
      font-family: 'Sarabun', sans-serif; 
      margin: 0; padding: 0;
      background-color: var(--bg-main);
      color: white;
      min-height: 100vh;
      display: flex; flex-direction: column;
      overflow-x: hidden;
    }

    .container { width: 100%; max-width: 480px; margin: 0 auto; padding: 25px; box-sizing: border-box; }

    /* Login UI */
    #login-screen { flex: 1; display: flex; align-items: center; justify-content: center; }
    .login-box {
      background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
      border-radius: 40px; padding: 50px 30px; text-align: center; width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .logo {
      width: 80px; height: 80px; background: var(--card-bg); border-radius: 25px;
      margin: 0 auto 30px; display: flex; align-items: center; justify-content: center;
      font-size: 32px; color: var(--accent); font-weight: 800;
      box-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

    .input-group { text-align: left; margin-bottom: 20px; }
    .input-group label { display: block; font-size: 11px; color: var(--accent-gold); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .neo-field {
      width: 100%; padding: 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.3); color: white; font-size: 16px; box-sizing: border-box; outline: none;
    }

    .btn-primary {
      width: 100%; padding: 18px; border-radius: 20px; border: none;
      font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s;
      background: var(--card-bg); color: var(--accent);
    }

    /* Dashboard UI */
    #employee-dashboard { display: none; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    .welcome-text h3 { margin: 0; font-size: 24px; font-weight: 700; color: white; }
    .welcome-text p { margin: 5px 0 0 0; font-size: 12px; color: var(--accent-gold); font-weight: 600; }

    .balance-card {
      background: linear-gradient(135deg, #3e2723 0%, #1a0f0d 100%);
      border-radius: 35px; padding: 40px 30px; margin-bottom: 25px;
      position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    }
    .balance-card small { display: block; opacity: 0.6; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
    .balance-card strong { font-size: 42px; font-weight: 800; color: var(--accent-gold); letter-spacing: -1.5px; }

    .status-badge {
      padding: 12px 20px; border-radius: 15px; margin-bottom: 25px; text-align: center;
      font-weight: 700; font-size: 12px; border: 1px solid rgba(255,255,255,0.05);
    }
    .safe { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .warn { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
    .danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); animation: pulse 2s infinite; }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
    .stat-item { background: var(--card-bg); border-radius: 25px; padding: 22px; color: var(--text-dark); box-shadow: var(--shadow); }
    .stat-item small { display: block; color: var(--text-muted); font-size: 10px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
    .stat-item strong { font-size: 20px; font-weight: 800; }

    .history-card { background: var(--card-bg); border-radius: 30px; padding: 10px; color: var(--text-dark); box-shadow: var(--shadow); }
    .log-entry {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 20px; border-bottom: 1px solid #f0f0f0;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-entry .date { font-size: 13px; color: var(--text-muted); }
    .log-entry .type { font-weight: 700; font-size: 14px; }
    .log-entry .time { font-weight: 800; color: var(--accent); }
    .late-time { color: var(--danger) !important; text-decoration: underline; }

    #loader { position: fixed; inset: 0; background: var(--bg-main); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.05); border-top-color: var(--accent-gold); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

    #slip-render-area { position: absolute; left: -9999px; }
  </style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <p style="margin-top: 20px; font-weight: 700; font-size: 12px; letter-spacing: 3px; color: var(--accent-gold);">SYSTEM SYNCING...</p>
</div>

<div class="container">
  <div id="login-screen">
    <div class="login-box">
      <div class="logo">TW</div>
      <h2 style="margin:0;">THONWITHI</h2>
      <p style="opacity: 0.4; font-size: 11px; margin-bottom: 40px; letter-spacing: 4px;">EMPLOYEE PORTAL</p>
      
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="name-in" class="neo-field" placeholder="ชื่อพนักงาน">
      </div>
      <div class="input-group" style="margin-bottom: 40px;">
        <label>Access Code</label>
        <input type="password" id="pass-in" class="neo-field" placeholder="••••">
      </div>
      <button class="btn-primary" onclick="handleLogin()">เข้าสู่ระบบ</button>
    </div>
  </div>

  <div id="employee-dashboard">
    <div class="header">
      <div class="welcome-text">
        <h3 id="ui-name">สวัสดี</h3>
        <p id="ui-dept">ฝ่ายปฏิบัติการ</p>
      </div>
      <button onclick="location.reload()" style="background:none; border:none; color:var(--danger); font-weight:700; font-size:12px; cursor:pointer;">ออกจากระบบ</button>
    </div>

    <div id="status-ui" class="status-badge"></div>

    <div class="balance-card">
      <small>ยอดรายได้โดยประมาณ</small>
      <strong id="ui-net">0.00 ฿</strong>
      <div style="margin-top: 30px;">
        <button onclick="exportSlip()" style="background:var(--accent-gold); color:white; border:none; padding:10px 25px; border-radius:15px; font-weight:700; font-size:11px; cursor:pointer;">บันทึกรูปสลิป</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-item"><small>มาทำงาน</small><strong id="ui-work">0 วัน</strong></div>
      <div class="stat-item"><small>มาสาย</small><strong id="ui-late" style="color:var(--danger)">0 ครั้ง</strong></div>
      <div class="stat-item"><small>โบนัสรวม</small><div id="ui-bonus" style="font-weight:800;">0 ฿</div></div>
      <div class="stat-item"><small>เบี้ยขยัน</small><strong id="ui-inc">-</strong></div>
    </div>

    <p style="font-size:12px; font-weight:800; color:var(--accent-gold); text-transform:uppercase; margin-bottom: 15px;">ประวัติการเข้างานล่าสุด</p>
    <div id="ui-logs" class="history-card"></div>
    <p style="text-align:center; font-size:10px; opacity:0.2; margin: 40px 0;">THONWITHI MANAGEMENT SYSTEM V2</p>
  </div>
</div>

<div id="slip-render-area">
  <div id="slip-template" style="width: 500px; background: white; color: #111; padding: 70px; font-family: 'Sarabun'; border: 1px solid #eee;">
    <h1 style="text-align:center; margin:0; color:#3e2723;">Thonwithi Cafe</h1>
    <p style="text-align:center; border-bottom:2px solid #3e2723; padding-bottom:25px; color:#777;">สรุปรายได้พนักงาน</p>
    <div id="slip-body"></div>
  </div>
</div>

<script>
  // URL ของคุณ
  const API_URL = "https://script.google.com/macros/s/AKfycbyfxj9FjtwLlFKGMsZm8eiEAkOXWOehQNl0xtkrR7UlNiT15D66vWIzONZbNDapRxLd/exec";
  const LATE_RATE = 5, GRACE = 60000;
  let user = null, stats = null;

  async function callAPI(action) {
    const url = `${API_URL}?action=${action}`;
    try {
      const response = await fetch(url, {
        method: 'GET',
        mode: 'cors',
        cache: 'no-cache',
        redirect: 'follow'
      });
      if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
      return await response.json();
    } catch (e) {
      console.error("API Call Failed:", e);
      throw e;
    }
  }

  async function handleLogin() {
    const n = document.getElementById('name-in').value.trim();
    const p = document.getElementById('pass-in').value.trim();
    if(!n || !p) return;

    document.getElementById('loader').style.display = 'flex';
    try {
      const settings = await callAPI('getEmployeeSettings');
      const found = settings.find(s => s.name.replace(/\s+/g,'').toLowerCase() === n.replace(/\s+/g,'').toLowerCase());

      if (found && p === "1234") { 
         user = found; await renderDashboard();
      } else {
         alert("รหัสผ่านหรือชื่อพนักงานไม่ถูกต้อง");
         document.getElementById('loader').style.display = 'none';
      }
    } catch (e) { 
      alert("⚠️ ไม่สามารถเชื่อมต่อกับฐานข้อมูลได้\n\nสาเหตุ: " + e.message + "\n\nวิธีแก้: ลองเปิดลิงก์ API ในแท็บใหม่เพื่อกดยอมรับสิทธิ์ของ Google ก่อนครับ"); 
      document.getElementById('loader').style.display = 'none';
    }
  }

  async function renderDashboard() {
    document.getElementById('ui-name').innerText = "สวัสดี, คุณ" + user.name;
    document.getElementById('ui-dept').innerText = user.dept || "ทั่วไป";

    try {
      const logs = await callAPI('getLogs');
      const now = new Date();
      const start = new Date(now); start.setDate(now.getDate() - ((now.getDay() + 5) % 7)); start.setHours(0,0,0,0);
      
      const myLogs = logs.filter(l => l.name.replace(/\s+/g,'').toLowerCase() === user.name.replace(/\s+/g,'').toLowerCase());
      const weekLogs = myLogs.filter(l => {
        let ts = l.timestamp;
        if (ts.includes('/')) { // กรณีเป็นรูปแบบ d/M/yyyy HH:mm:ss
           let parts = ts.split(' ');
           let dParts = parts[0].split('/');
           ts = `${dParts[2]}-${dParts[1]}-${dParts[0]}T${parts[1]}`;
        }
        return new Date(ts.replace(' ','T')) >= start;
      });

      const daily = {};
      weekLogs.forEach(l => {
        const dS = l.timestamp.split(' ')[0];
        const dt = new Date(l.timestamp.replace(' ','T'));
        if(!daily[dS]) daily[dS] = { in:null, out:null };
        if(!daily[dS].in || dt < daily[dS].in) daily[dS].in = dt;
        if(!daily[dS].out || dt > daily[dS].out) daily[dS].out = dt;
      });

      let lateM = 0, lateC = 0, workD = 0, hrs = 0;
      for(let d in daily) {
        if(daily[d].in) {
          workD++;
          if(user.startTime && user.startTime.includes(':')) {
            const [th, tm] = user.startTime.split(':').map(Number);
            const target = new Date(daily[d].in); target.setHours(th, tm, 0, 0);
            if(daily[d].in - target > GRACE) { lateM += Math.ceil((daily[d].in - target)/60000); lateC++; }
          }
          if(daily[d].out > daily[d].in) hrs += (daily[d].out - daily[d].in)/3600000;
        }
      }

      const statusBox = document.getElementById('status-ui');
      let eligibleBonus = true;
      if(lateC === 0) { statusBox.className = "status-badge safe"; statusBox.innerHTML = "✨ วินัยเยี่ยมมาก! สัปดาห์นี้ไม่สายเลย"; }
      else if(lateC <= 2) { statusBox.className = "status-badge warn"; statusBox.innerHTML = `🟨 ใบเหลือง: สาย ${lateC} ครั้งแล้วนะ`; }
      else { statusBox.className = "status-badge danger"; statusBox.innerHTML = "🟥 ใบแดง: สายเกินกำหนด ติดต่อผู้จัดการ"; eligibleBonus = false; }

      const rate = parseFloat(user.rate) || 0;
      const gross = (user.empType || "").includes("รายวัน") ? (workD * rate) : (hrs * rate);
      const inc = (lateC === 0 && workD > 0) ? 125 : 0;
      const bonus = eligibleBonus ? (parseFloat(user.bonus) || 0) : 0;
      const net = Math.max(0, gross + bonus + inc - (lateM * LATE_RATE) - (parseFloat(user.advance) || 0));

      stats = { net, workD, lateC, bonus, inc, gross, lateM };

      document.getElementById('ui-net').innerText = net.toLocaleString(undefined, {minimumFractionDigits:2}) + " ฿";
      document.getElementById('ui-work').innerText = workD + " วัน";
      document.getElementById('ui-late').innerText = lateC + " ครั้ง";
      document.getElementById('ui-bonus').innerHTML = eligibleBonus ? (bonus.toLocaleString() + " ฿") : `<span style="text-decoration:line-through; opacity:0.3;">${user.bonus}</span> <span style="color:var(--danger)">0 ฿</span>`;
      document.getElementById('ui-inc').innerText = inc > 0 ? "ได้รับ ✅" : "ไม่ได้ ❌";

      document.getElementById('ui-logs').innerHTML = weekLogs.slice().reverse().map(l => {
        return `<div class="log-entry"><span class="date">${l.timestamp.split(' ')[0]}</span><span class="type">ลงเวลา</span><span class="time">${l.timestamp.split(' ')[1]}</span></div>`;
      }).join('') || "<p style='text-align:center; padding:20px; font-size:12px; color:#aaa;'>ไม่มีข้อมูลในสัปดาห์นี้</p>";

      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('employee-dashboard').style.display = 'block';
    } catch(e) { 
      alert("เกิดข้อผิดพลาดในการโหลดข้อมูลประวัติ: " + e.message); 
    }
    document.getElementById('loader').style.display = 'none';
  }

  function exportSlip() {
    document.getElementById('loader').style.display = 'flex';
    const body = `
      <div style="display:flex; justify-content:space-between; margin-bottom:30px; font-weight:700;"><span>พนักงาน: ${user.name}</span><span>วันที่: ${new Date().toLocaleDateString('th-TH')}</span></div>
      <div style="border-top:1px dashed #ddd; padding:20px 0;">
        <div style="display:flex; justify-content:space-between; margin-bottom:12px;"><span>ค่าแรงพื้นฐาน (${stats.workD} วัน)</span><span>${stats.gross.toLocaleString()} ฿</span></div>
        <div style="display:flex; justify-content:space-between; margin-bottom:12px; color:green;"><span>โบนัสพิเศษ</span><span>+${stats.bonus.toLocaleString()} ฿</span></div>
        <div style="display:flex; justify-content:space-between; margin-bottom:12px; color:green;"><span>เบี้ยขยัน</span><span>+${stats.inc.toLocaleString()} ฿</span></div>
        <div style="display:flex; justify-content:space-between; margin-bottom:12px; color:red;"><span>หักมาสาย (${stats.lateM} นาที)</span><span>-${(stats.lateM * LATE_RATE).toLocaleString()} ฿</span></div>
        <div style="display:flex; justify-content:space-between; color:red;"><span>หักเบิกล่วงหน้า</span><span>-${(parseFloat(user.advance) || 0).toLocaleString()} ฿</span></div>
      </div>
      <div style="background:#1a0f0d; color:white; padding:35px; border-radius:20px; display:flex; justify-content:space-between; align-items:center; font-size:28px; font-weight:800; margin-top:30px;">
        <span>สุทธิ</span><span style="color:#d4af37;">${stats.net.toLocaleString()} ฿</span>
      </div>
    `;
    document.getElementById('slip-body').innerHTML = body;
    html2canvas(document.getElementById('slip-template'), {scale:2}).then(cvs => {
      const a = document.createElement('a'); a.download = `Slip_${user.name}.png`; a.href = cvs.toDataURL(); a.click();
      document.getElementById('loader').style.display = 'none';
    });
  }
</script>
</body>
</html>
