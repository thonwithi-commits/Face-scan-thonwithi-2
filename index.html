<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ระบบลงเวลาเข้า-ออกงาน</title>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Sarabun', sans-serif; 
      margin: 0; padding: 0; min-height: 100vh; 
      display: flex; flex-direction: column; align-items: center; justify-content: center; 
      background: linear-gradient(135deg, #3e2723 0%, #5d4037 50%, #8d6e63 100%);
      color: #ffffff; overflow: hidden;
    }
    .glass-card { 
      background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.2); 
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); 
      border-radius: 24px; width: 90%; max-width: 500px; padding: 30px 20px;
      text-align: center; position: relative;
    }
    .brand-logo { max-width: 140px; margin: 0 auto 10px auto; display: block; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3)); }
    #time { font-size: 48px; font-weight: 600; margin: 0; }
    
    #status { 
      font-size: 16px; font-weight: 600; background: rgba(0, 0, 0, 0.4);
      padding: 10px 15px; border-radius: 12px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1);
      color: #ffc107;
      word-wrap: break-word;
    }

    .video-container {
      width: 100%; max-width: 350px; height: 260px; margin: 0 auto 15px auto;
      border-radius: 16px; overflow: hidden; border: 2px solid rgba(255, 255, 255, 0.3);
      display: none; background: #000; position: relative;
    }
    video { width: 100%; height: 100%; object-fit: cover; transform: scale(1.6) scaleX(-1); }
    
    .btn-container { display: flex; flex-direction: column; gap: 12px; width: 100%; }
    .btn-row { display: flex; gap: 12px; }
    .btn { 
      border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 16px; padding: 18px;
      font-size: 20px; font-weight: 600; cursor: pointer; color: white; flex: 1;
      transition: 0.3s; font-family: 'Sarabun', sans-serif;
    }
    .btn:active { transform: scale(0.95); }
    .btn-in { background: rgba(40, 167, 69, 0.85); }
    .btn-out { background: rgba(220, 53, 69, 0.85); }
    .btn-manual { background: rgba(141, 110, 99, 0.85); font-size: 16px; padding: 14px; width: 100%; margin-top: 5px; }
    .btn-admin { background: rgba(30, 30, 30, 0.85); font-size: 14px; padding: 12px; margin-top: 10px; }
    .btn-cancel { display: none; background: rgba(255,255,255,0.2); margin-top: 10px; font-size: 16px; width: 100%; }

    .modal-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-content { background: rgba(255,255,255,0.15); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.2); width: 80%; max-width: 350px; }
    .modal-btn { background: #ffc107; padding: 10px 30px; border-radius: 10px; border: none; cursor: pointer; margin-top: 20px; font-weight: 600; font-size: 16px;}

    #register-ui { display: none; margin-top: 15px; }
    .input-field { width: 90%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.2); color: white; margin-bottom: 10px; text-align: center; font-size: 18px; }
    
    #db-count { font-size: 12px; opacity: 0.8; margin-top: 10px; }
  </style>
</head>
<body>

<div class="modal-overlay" id="custom-modal">
  <div class="modal-content">
    <div id="modal-text" style="font-size: 18px"></div>
    <button class="modal-btn" onclick="closeMessage()">ตกลง</button>
  </div>
</div>

<div class="glass-card">
  <img src="indexlogo.png" class="brand-logo" onerror="this.style.display='none'">
  <div id="time">00:00:00</div>
  <div id="date" style="color: rgba(255,255,255,0.7); font-size: 14px;">วัน เดือน ปี</div>

  <div class="video-container" id="video-box">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <div id="status">กำลังโหลดระบบ AI...</div>

  <div id="register-ui">
    <input type="text" id="reg-name" placeholder="ชื่อพนักงาน (ให้ตรงกับแผ่นงาน Settings)" class="input-field">
    
    <div class="progress-dots" id="reg-progress" style="display:none; justify-content:center; gap:10px; margin-bottom:15px;">
      <div class="dot" style="width:12px; height:12px; background:#ffc107; border-radius:50%; transition: 0.3s;"></div>
      <div class="dot" style="width:12px; height:12px; background:rgba(255,255,255,0.2); border-radius:50%; transition: 0.3s;"></div>
    </div>

    <button class="btn btn-in" style="width: 100%" onclick="performCapture()">📸 บันทึกใบหน้า (2 มุม)</button>
    <button class="btn btn-admin" style="background: rgba(121, 85, 72, 0.9); width:100%; margin-top: 10px;" onclick="registerIdOnly()">ลงทะเบียนเฉพาะรหัส/ชื่อ (Manual)</button>
  </div>

  <div class="btn-container" id="menu-buttons" style="display:none;">
    <div class="btn-row">
      <button class="btn btn-in" onclick="startSystem('เข้างาน')">เข้างาน</button>
      <button class="btn btn-out" onclick="startSystem('ออกงาน')">ออกงาน</button>
    </div>
    <button class="btn btn-manual" onclick="manualLog()">ลงเวลาด้วยรหัส/ชื่อพนักงาน (Manual)</button>
    <button class="btn btn-admin" onclick="checkAdmin()">ลงทะเบียนพนักงาน (Admin Only)</button>
  </div>

  <button class="btn btn-cancel" id="btn-cancel" onclick="resetSystem()">ย้อนกลับ / ยกเลิก</button>
  
  <div id="db-count">พนักงานในระบบ: 0 คน</div>
</div>

<script>
  // --- ก๊อปปี้ URL เว็บแอปของคุณมาใส่ตรงนี้ ---
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwBd8OsZFF2i44KrfCnGI7c9idmDakwWEgse9qt_WDOD5OOxG13eRaXf16SavEnP2oZ/exec";
  const ADMIN_PASSWORD = "123";

  let knownFaces = [];
  let isProcessing = false;
  let scanInterval = null;
  let currentMode = "";
  
  let regStep = 0;
  let regDescriptors = [];
  const regInstructions = ["มองตรง แล้วกดบันทึก", "เอียงหน้าเล็กน้อย แล้วกดบันทึก"];

  window.onload = async () => {
    updateClock(); setInterval(updateClock, 1000);
    const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
    
    try {
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);
      await fetchDatabase();
      
      document.getElementById('menu-buttons').style.display = 'flex';
    } catch (e) {
      document.getElementById('status').innerText = "❌ เกิดข้อผิดพลาดในการโหลดระบบ AI";
    }
  };

  async function fetchDatabase() {
    document.getElementById('status').innerText = "กำลังซิงค์ข้อมูลใบหน้า...";
    try {
      // ใช้วิธีส่ง headers แบบ plain text เพื่อหลีกเลี่ยง CORS ของ Google
      const res = await fetch(WEB_APP_URL, { 
        method: 'POST', 
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({action: 'getKnownFaces'}) 
      });
      
      const textResponse = await res.text(); // ดึงมาเป็นข้อความก่อนเพื่อเช็ก Error
      
      try {
        const data = JSON.parse(textResponse);
        knownFaces = [];
        
        // รองรับข้อมูลรูปแบบเก่าและใหม่
        let faceArray = Array.isArray(data) ? data : (data.data || []);

        faceArray.forEach(u => {
          let desc = u.descriptor;
          let label = u.label || u.name || "Unknown";
          
          if (desc && desc.length > 0 && desc !== "[]") {
            let parsedDesc = typeof desc === 'string' ? JSON.parse(desc) : desc;
            knownFaces.push({ name: label, descriptor: new Float32Array(parsedDesc) });
          }
        });
        
        document.getElementById('db-count').innerText = `ซิงค์สำเร็จ: ${knownFaces.length} คน`;
        document.getElementById('status').innerText = "✅ ระบบพร้อมใช้งาน";
        document.getElementById('status').style.color = "#81c784";

      } catch (parseError) {
        console.error("Parse Error:", textResponse);
        document.getElementById('status').innerText = "❌ รูปแบบข้อมูลจาก Google ผิดพลาด (เช็ก Google Script)";
        document.getElementById('status').style.color = "#ff5252";
      }

    } catch (error) {
      document.getElementById('status').innerText = `❌ การเชื่อมต่อล้มเหลว: ${error.message}`;
      document.getElementById('status').style.color = "#ff5252";
      console.error(error);
    }
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('time').innerText = now.toLocaleTimeString('th-TH', {hour12:false});
    document.getElementById('date').innerText = now.toLocaleDateString('th-TH', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  }

  function manualLog() {
    const empName = prompt("กรุณาระบุชื่อพนักงาน\n(หมายเหตุ: ต้องสะกดให้ตรงกับในแผ่นงาน Settings):");
    if (!empName) return; 

    const isCheckIn = confirm(`พนักงาน: ${empName}\n\nกดปุ่ม [ตกลง] = เข้างาน\nกดปุ่ม [ยกเลิก] = ออกงาน`);
    const typeLabel = isCheckIn ? "เข้างาน" : "ออกงาน";

    document.getElementById('status').innerText = `กำลังบันทึกข้อมูลสำหรับ ${empName}...`;
    document.getElementById('status').style.color = "#ffc107";
    
    fetch(WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'log', name: empName + " (Manual)", type: typeLabel, lat: "", lng: "" })
    })
    .then(() => {
      showMessage(`บันทึก ${typeLabel} สำเร็จ\nสวัสดีคุณ ${empName}`);
      resetSystem();
    })
    .catch((err) => {
      showMessage(`เกิดข้อผิดพลาดในการส่งข้อมูล: ${err.message}`);
      resetSystem();
    });
  }

  function registerIdOnly() {
    const name = document.getElementById('reg-name').value.trim();
    if (!name) { showMessage("กรุณาพิมพ์ชื่อพนักงานก่อนครับ"); return; }
    
    document.getElementById('status').innerText = "กำลังส่งข้อมูล...";
    fetch(WEB_APP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'register', name: name + " (Manual)", descriptor: [] })
    }).then(() => {
      showMessage(`ลงทะเบียน ${name} (แบบคีย์ชื่อ) สำเร็จ!`);
      setTimeout(() => { fetchDatabase(); resetSystem(); }, 1500);
    }).catch(err => {
      showMessage(`Error: ${err.message}`);
    });
  }

  async function startSystem(mode) {
    if(knownFaces.length === 0) {
      showMessage("ยังไม่มีข้อมูลใบหน้าในระบบ หรือซิงค์ข้อมูลไม่สำเร็จ\nกรุณาลงทะเบียนใบหน้าก่อนครับ");
      return;
    }
    
    currentMode = mode;
    document.getElementById('menu-buttons').style.display = 'none';
    document.getElementById('video-box').style.display = 'block';
    document.getElementById('btn-cancel').style.display = 'block';
    document.getElementById('status').innerText = `กล้องพร้อมแล้ว สแกน${mode}ได้เลย...`;
    document.getElementById('status').style.color = "#fff";
    
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
      document.getElementById('video').srcObject = stream;
      isProcessing = false;
      startScanning();
    } catch(err) {
      showMessage("ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตการใช้กล้อง");
      resetSystem();
    }
  }

  function startScanning() {
    const video = document.getElementById('video');
    scanInterval = setInterval(async () => {
      if (isProcessing) return;
      
      const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
      if (detection) {
        let bestMatch = { name: 'unknown', distance: 1.0 };
        
        knownFaces.forEach(u => {
          const dist = faceapi.euclideanDistance(detection.descriptor, u.descriptor);
          if (dist < bestMatch.distance) bestMatch = { name: u.name, distance: dist };
        });

        // Threshold 0.58 สแกนง่ายขึ้น
        if (bestMatch.distance < 0.58) {
          isProcessing = true; 
          clearInterval(scanInterval);
          saveLog(bestMatch.name);
        } else {
          document.getElementById('status').innerText = `ใบหน้าไม่ตรงกัน (ความคลาดเคลื่อน: ${bestMatch.distance.toFixed(2)})`;
          document.getElementById('status').style.color = "#ff5252";
        }
      } else {
        document.getElementById('status').innerText = `กำลังค้นหาใบหน้า... กรุณามองกล้อง`;
        document.getElementById('status').style.color = "#fff";
      }
    }, 800);
  }

  function saveLog(name) {
    document.getElementById('status').innerText = `พบคุณ: ${name} กำลังบันทึกเวลา...`;
    fetch(WEB_APP_URL, { 
      method: 'POST', 
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({action:'log', name: name, type: currentMode, lat: "", lng: ""}) 
    })
    .then(() => { 
      showMessage(`บันทึก ${currentMode} สำเร็จ\nสวัสดีคุณ ${name}`); 
      stopCamera();
    })
    .catch((err) => {
      showMessage(`เครือข่ายมีปัญหา: ${err.message}`);
      resetSystem();
    });
  }

  function checkAdmin() {
    const pass = prompt("รหัสผ่าน Admin:");
    if (pass === ADMIN_PASSWORD) {
      document.getElementById('menu-buttons').style.display = 'none';
      document.getElementById('register-ui').style.display = 'block';
      document.getElementById('video-box').style.display = 'block';
      document.getElementById('btn-cancel').style.display = 'block';
      
      regStep = 0;
      regDescriptors = [];
      document.getElementById('reg-progress').style.display = 'flex';
      const dots = document.querySelectorAll('.dot');
      dots[0].style.background = '#ffc107';
      dots[1].style.background = 'rgba(255,255,255,0.2)';

      document.getElementById('status').innerText = regInstructions[0];
      
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
        .then(s => document.getElementById('video').srcObject = s);
    }
  }

  async function performCapture() {
    const name = document.getElementById('reg-name').value.trim();
    if(!name) { showMessage("กรุณาพิมพ์ชื่อพนักงานก่อนครับ"); return; }
    
    document.getElementById('status').innerText = "กำลังวิเคราะห์ใบหน้า อยู่นิ่งๆ...";
    const video = document.getElementById('video');
    const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
    
    if (detection) {
      regDescriptors.push(Array.from(detection.descriptor));
      const dots = document.querySelectorAll('.dot');
      if (dots[regStep]) dots[regStep].style.background = '#81c784'; 
      regStep++;

      if (regStep < 2) {
        document.getElementById('status').innerText = regInstructions[regStep];
        if (dots[regStep]) dots[regStep].style.background = '#ffc107'; 
      } else {
        const averaged = regDescriptors[0].map((_, i) => (regDescriptors[0][i] + regDescriptors[1][i]) / 2);
        
        document.getElementById('status').innerText = "ครบ 2 มุม กำลังบันทึกข้อมูล...";
        fetch(WEB_APP_URL, { 
          method: 'POST', 
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({action:'register', name: name, descriptor: averaged}) 
        })
        .then(() => { 
          showMessage(`ลงทะเบียนคุณ ${name} สำเร็จ!`); 
          stopCamera();
          setTimeout(() => { fetchDatabase(); resetSystem(); }, 1500); // โหลดข้อมูลกลับมาทันที
        })
        .catch(err => {
          showMessage(`เกิดข้อผิดพลาด: ${err.message}`);
          stopCamera();
        });
      }
    } else {
      showMessage("ไม่พบใบหน้า กรุณาถอดแมสก์และมองกล้องให้ชัดเจน");
      document.getElementById('status').innerText = regInstructions[regStep];
    }
  }

  function stopCamera() {
    if(scanInterval) clearInterval(scanInterval);
    const video = document.getElementById('video');
    if(video.srcObject) {
      video.srcObject.getTracks().forEach(track => track.stop());
    }
  }

  function showMessage(t) { document.getElementById('modal-text').innerText = t; document.getElementById('custom-modal').style.display = 'flex'; }
  function closeMessage() { 
    document.getElementById('custom-modal').style.display = 'none'; 
    if(isProcessing || document.getElementById('register-ui').style.display === 'block') {
      resetSystem();
    }
  }
  
  function resetSystem() { 
    stopCamera();
    document.getElementById('video-box').style.display = 'none';
    document.getElementById('register-ui').style.display = 'none';
    document.getElementById('reg-progress').style.display = 'none';
    document.getElementById('btn-cancel').style.display = 'none';
    document.getElementById('menu-buttons').style.display = 'flex';
    document.getElementById('reg-name').value = "";
    isProcessing = false;
    
    if (knownFaces.length > 0) {
        document.getElementById('status').innerText = "✅ ระบบพร้อมใช้งาน";
        document.getElementById('status').style.color = "#81c784";
    } else {
        document.getElementById('status').innerText = "กรุณาเลือกทำรายการ (ยังไม่มีใบหน้าในระบบ)";
        document.getElementById('status').style.color = "#ffc107";
    }
  }
</script>
</body>
</html>
